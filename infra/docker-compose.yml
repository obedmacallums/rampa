name: rampa

x-backend-env: &backend-env
  DJANGO_SECRET_KEY: dev-only-secret
  DJANGO_DEBUG: "1"
  DJANGO_ALLOWED_HOSTS: "*"
  POSTGRES_HOST: db
  POSTGRES_DB: rampa
  POSTGRES_USER: rampa
  POSTGRES_PASSWORD: rampa
  REDIS_URL: redis://redis:6379/0
  S3_ENDPOINT: http://minio:9000
  S3_PUBLIC_ENDPOINT: http://localhost:9000
  S3_BUCKET: rampa
  S3_ACCESS_KEY: rampa
  S3_SECRET_KEY: rampasecret
  TUS_PUBLIC_URL: http://localhost:1080/files/
  TUSD_HOOK_SECRET: dev-hook-secret
  TITILER_PUBLIC_URL: http://localhost:8081

services:
  db:
    # multi-arch community build referenced by postgis-docker's README;
    # the official postgis/postgis images ship no linux/arm64 manifest
    image: imresamu/postgis:16-3.4-alpine
    environment:
      POSTGRES_DB: rampa
      POSTGRES_USER: rampa
      POSTGRES_PASSWORD: rampa
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rampa"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine

  minio:
    image: minio/minio:RELEASE.2024-12-18T13-15-44Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: rampa
      MINIO_ROOT_PASSWORD: rampasecret
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 3s
      retries: 10

  minio-init:
    image: minio/mc:RELEASE.2024-11-21T17-21-54Z
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: ["/bin/sh", "/init/create-bucket.sh"]
    volumes:
      - ./minio-init:/init:ro

  tusd:
    image: tusproject/tusd:v2.6
    depends_on:
      minio:
        condition: service_healthy
    command: >
      -port 1080
      -behind-proxy
      -s3-bucket rampa
      -s3-object-prefix tus-staging/
      -s3-endpoint http://minio:9000
      "-hooks-http=http://backend:8000/api/v1/hooks/tusd?secret=dev-hook-secret"
      -hooks-enabled-events post-create,post-finish
    environment:
      AWS_ACCESS_KEY_ID: rampa
      AWS_SECRET_ACCESS_KEY: rampasecret
      AWS_REGION: us-east-1
    ports:
      - "1080:1080"

  titiler:
    # pinned by digest: only recent multi-arch (arm64) builds are published
    # under "latest"; versioned tags up to 0.24.0 are amd64-only
    image: ghcr.io/developmentseed/titiler@sha256:d66f1525e9cad32b7be8e3b0cc1d3d6884a70f0a48ffede88dbccd18c199d357
    environment:
      # allow COG fetches from minio presigned URLs
      GDAL_DISABLE_READDIR_ON_OPEN: EMPTY_DIR
      GDAL_HTTP_MERGE_CONSECUTIVE_RANGES: "YES"
      TITILER_API_CORS_ORIGINS: "*"
    ports:
      # recent titiler images serve on :80 (older ones used :8000)
      - "8081:80"

  backend:
    build:
      context: ..
      dockerfile: infra/backend.Dockerfile
    environment: *backend-env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
      minio:
        condition: service_healthy
    command: >
      sh -c "python manage.py migrate --noinput &&
             python manage.py loaddata crs_catalog &&
             gunicorn config.wsgi:application --bind 0.0.0.0:8000 --workers 2 --timeout 120"
    ports:
      - "8000:8000"

  worker:
    build:
      context: ..
      dockerfile: infra/backend.Dockerfile
    environment: *backend-env
    depends_on:
      backend:
        condition: service_started
    command: celery -A config worker -B --loglevel=info
    volumes:
      - worker-scratch:/scratch

  frontend:
    build:
      context: ..
      dockerfile: infra/frontend.Dockerfile
    depends_on:
      backend:
        condition: service_started
    ports:
      - "8080:80"

volumes:
  pgdata:
  minio-data:
  worker-scratch:
